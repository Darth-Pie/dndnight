<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&amp;D Night — The Chronicle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --shadow:       #100b07;
    --leather:      #3a2417;
    --leather-lt:   #4d3220;
    --leather-dk:   #261609;
    --parchment:    #ecdcb6;
    --parchment-dk: #d9c49a;
    --gold:         #c9a96a;
    --gold-bright:  #ecd8a4;
    --wax:          #7c1f1f;
    --wax-dk:       #5c1414;
    --ink:          #3a2a1a;
    --ink-soft:     #6b5436;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% 35%, #261c14 0%, var(--shadow) 70%);
    font-family:'EB Garamond', serif;
    color:var(--parchment);
    overflow-x:hidden;
  }

  /* ---------- Ambient study ---------- */
  .study{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
    perspective:2400px;
    position:relative;
  }

  .motes{
    position:fixed; inset:0; pointer-events:none; z-index:0;
  }
  .mote{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--gold-bright); opacity:0.35;
    animation:drift 14s linear infinite;
  }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.5; }
    90%{ opacity:0.3; }
    100%{ transform:translateY(-120vh) translateX(20px); opacity:0; }
  }

  /* ---------- Book ---------- */
  .book{
    position:relative;
    width:min(900px, 92vw);
    height:min(620px, 80vh);
    transform-style:preserve-3d;
  }

  /* the open spread sits underneath, always present */
  .spread{
    position:absolute; inset:0;
    display:flex;
    background:var(--leather-dk);
    border-radius:6px;
    box-shadow:0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px var(--leather);
    overflow:hidden;
  }

  .page{
    flex:1 1 50%;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(0,0,0,0.08), transparent 60%),
      linear-gradient(var(--parchment), var(--parchment-dk));
    color:var(--ink);
    padding:36px 34px;
    position:relative;
    overflow-y:auto;
  }
  .page::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(rgba(120,90,50,0.04) 0px, transparent 2px, transparent 26px),
      radial-gradient(circle at 90% 90%, rgba(120,90,50,0.12), transparent 40%);
    pointer-events:none;
  }
  .page-left{
    border-right:2px solid rgba(0,0,0,0.25);
    box-shadow: inset -18px 0 30px -20px rgba(0,0,0,0.5);
  }
  .page-right{
    box-shadow: inset 18px 0 30px -20px rgba(0,0,0,0.5);
  }

  /* ---------- Cover (lid that hinges open) ---------- */
  .cover{
    position:absolute; inset:0;
    transform-origin:left center;
    transform-style:preserve-3d;
    transition:transform 1.3s cubic-bezier(.65,0,.35,1);
    cursor:pointer;
    z-index:5;
  }
  .cover-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:6px;
    background:
      radial-gradient(ellipse at 30% 20%, var(--leather-lt), var(--leather) 55%, var(--leather-dk) 100%);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.65),
      inset 0 0 0 10px var(--leather-dk),
      inset 0 0 60px rgba(0,0,0,0.5);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px;
    padding:30px;
  }
  .cover-face::after{ /* spine bands */
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:14px;
    background:repeating-linear-gradient(
      var(--leather-dk) 0 6px, transparent 6px 46px
    );
    opacity:0.5;
  }

  .sigil{ width:120px; height:120px; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }

  .cover-title{
    font-family:'Cinzel Decorative', serif;
    font-weight:700;
    font-size:clamp(28px, 4vw, 42px);
    letter-spacing:0.04em;
    color:var(--gold-bright);
    text-shadow:0 2px 4px rgba(0,0,0,0.6), 0 0 18px rgba(201,169,106,0.25);
    text-align:center;
    margin:0;
  }
  .cover-sub{
    font-family:'Cinzel', serif;
    font-size:13px;
    letter-spacing:0.3em;
    text-transform:uppercase;
    color:var(--gold);
    opacity:0.85;
    text-align:center;
  }
  .cover-hint{
    position:absolute; bottom:26px;
    font-size:13px; letter-spacing:0.15em; text-transform:uppercase;
    font-family:'Cinzel', serif;
    color:var(--gold);
    opacity:0.6;
    animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:0.4;} 50%{opacity:0.85;} }

  .book.open .cover{
    transform:rotateY(-165deg);
  }
  .book.open .cover-face{ pointer-events:none; }

  /* ---------- Bookmark tabs ---------- */
  .tabs{
    position:absolute;
    right:-2px; top:50%;
    transform:translateY(-50%);
    display:flex; flex-direction:column; gap:10px;
    z-index:6;
    opacity:0; pointer-events:none;
    transition:opacity 0.6s ease 0.6s;
  }
  .book.open .tabs{ opacity:1; pointer-events:auto; }

  .tab{
    font-family:'Cinzel', serif;
    font-size:12px; letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--parchment);
    background:var(--wax);
    border:1px solid rgba(0,0,0,0.3);
    border-left:none;
    padding:9px 14px 9px 12px;
    border-radius:0 5px 5px 0;
    cursor:pointer;
    box-shadow:2px 3px 6px rgba(0,0,0,0.4);
    transform:translateX(0);
    transition:transform 0.2s ease, background 0.2s ease;
    white-space:nowrap;
  }
  .tab:hover{ transform:translateX(6px); }
  .tab.active{ background:var(--gold); color:var(--ink); transform:translateX(10px); }

  /* ---------- Page content ---------- */
  .chapter-label{
    font-family:'Cinzel', serif;
    font-size:12px; letter-spacing:0.25em; text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 6px;
  }
  .chapter-title{
    font-family:'Cinzel Decorative', serif;
    font-size:clamp(22px, 3vw, 30px);
    margin:0 0 18px;
    color:var(--wax);
  }
  .drop-cap::first-letter{
    font-family:'Cinzel Decorative', serif;
    font-size:3.2em;
    float:left;
    line-height:0.8;
    padding:4px 8px 0 0;
    color:var(--wax);
  }
  .page p{ line-height:1.65; font-size:17px; margin:0 0 14px; }
  .placeholder{ color:var(--ink-soft); font-style:italic; }

  .toc-list{ list-style:none; padding:0; margin:18px 0 0; }
  .toc-list li{
    font-family:'Cinzel', serif;
    font-size:15px;
    letter-spacing:0.02em;
    padding:10px 0;
    border-bottom:1px dashed rgba(58,42,26,0.25);
    cursor:pointer;
    display:flex; justify-content:space-between;
    transition:color 0.2s ease, padding-left 0.2s ease;
  }
  .toc-list li:hover{ color:var(--wax); padding-left:6px; }
  .toc-list li span.dots{ flex:1; border-bottom:1px dotted rgba(58,42,26,0.3); margin:0 8px 5px; }

  table.roster{ width:100%; border-collapse:collapse; margin-top:10px; font-size:15px; }
  table.roster th, table.roster td{
    text-align:left; padding:8px 6px; border-bottom:1px solid rgba(58,42,26,0.2);
  }
  table.roster th{ font-family:'Cinzel', serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); }

  .session-card{
    border:1px solid rgba(58,42,26,0.25);
    border-radius:4px;
    padding:14px 16px;
    margin-bottom:14px;
    background:rgba(255,255,255,0.15);
  }
  .session-card .meta{ font-family:'Cinzel', serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--wax); margin-bottom:6px; }

  .rules-list{ padding-left:20px; margin:0 0 14px; }
  .rules-list li{ margin-bottom:8px; line-height:1.5; }

  .conduct-link{
    display:inline-block;
    margin-top:8px;
    font-family:'Cinzel', serif;
    font-size:13px; letter-spacing:0.05em;
    color:var(--wax);
    text-decoration:none;
    border-bottom:1px solid var(--wax);
    padding-bottom:2px;
  }
  .conduct-link:hover{ color:var(--wax-dk); }

  /* ---------- Enter the Realm / wax seal ---------- */
  .realm-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; text-align:center; gap:18px;
  }
  .seal{
    width:140px; height:140px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #9a2b2b, var(--wax) 55%, var(--wax-dk) 100%);
    box-shadow:0 8px 20px rgba(0,0,0,0.35), inset 0 0 14px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    border:none;
    transition:transform 0.25s ease;
    position:relative;
  }
  .seal:hover{ transform:scale(1.04); }
  .seal svg{ width:70px; height:70px; }
  .seal.cracking{ animation:crack 0.6s ease forwards; }
  @keyframes crack{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.12) rotate(2deg); }
    70%{ transform:scale(0.96) rotate(-2deg); }
    100%{ transform:scale(1.3); opacity:0; }
  }
  .realm-label{ font-family:'Cinzel', serif; font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-soft); }

  /* ---------- Scrollbars (parchment feel) ---------- */
  .page::-webkit-scrollbar{ width:8px; }
  .page::-webkit-scrollbar-thumb{ background:rgba(58,42,26,0.3); border-radius:4px; }

  /* ---------- Footer credit ---------- */
  .footer-note{
    position:fixed; bottom:10px; left:0; right:0;
    text-align:center;
    font-family:'Cinzel', serif;
    font-size:11px; letter-spacing:0.15em;
    color:rgba(236,216,164,0.35);
    z-index:1;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 720px){
    .book{ height:min(78vh, 720px); }
    .spread{ flex-direction:column; }
    .page-left{ border-right:none; border-bottom:2px solid rgba(0,0,0,0.25); flex:0 0 38%; }
    .page-right{ flex:1 1 auto; }
    .tabs{ right:auto; top:auto; bottom:-46px; left:0; right:0; transform:none; flex-direction:row; justify-content:center; flex-wrap:wrap; gap:6px; }
    .tab{ border-radius:5px; border-left:1px solid rgba(0,0,0,0.3); padding:7px 10px; }
    .tab:hover, .tab.active{ transform:translateY(-2px); }
  }

  @media (prefers-reduced-motion: reduce){
    .cover, .mote, .seal.cracking, .cover-hint{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="motes" id="motes"></div>
<div class="footer-note">dndnight.org</div>

<div class="study">
  <div class="book" id="book">

    <!-- Open spread, sits beneath the cover -->
    <div class="spread">
      <div class="page page-left">
        <p class="chapter-label">Table of Contents</p>
        <h2 class="chapter-title">The Chronicle</h2>
        <ul class="toc-list" id="tocList">
          <li data-chapter="welcome">Welcome<span class="dots"></span>I</li>
          <li data-chapter="party">The Party<span class="dots"></span>II</li>
          <li data-chapter="session">Tonight's Session<span class="dots"></span>III</li>
          <li data-chapter="rules">House Rules<span class="dots"></span>IV</li>
          <li data-chapter="realm">Enter the Realm<span class="dots"></span>V</li>
        </ul>
      </div>

      <div class="page page-right" id="pageRight">
        <!-- filled by JS -->
      </div>

      <div class="tabs" id="tabs">
        <div class="tab" data-chapter="welcome">Welcome</div>
        <div class="tab" data-chapter="party">The Party</div>
        <div class="tab" data-chapter="session">Session</div>
        <div class="tab" data-chapter="rules">Rules</div>
        <div class="tab" data-chapter="realm">Enter</div>
      </div>
    </div>

    <!-- Cover, hinges open on click -->
    <div class="cover" id="cover">
      <div class="cover-face">
        <svg class="sigil" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="60" cy="60" r="56" stroke="#c9a96a" stroke-width="2" opacity="0.8"/>
          <circle cx="60" cy="60" r="44" stroke="#c9a96a" stroke-width="1" opacity="0.5"/>
          <path d="M60 10 L68 50 L108 60 L68 70 L60 110 L52 70 L12 60 L52 50 Z" stroke="#ecd8a4" stroke-width="1.6" fill="none"/>
          <circle cx="60" cy="60" r="6" fill="#c9a96a"/>
        </svg>
        <h1 class="cover-title">D&amp;D Night</h1>
        <p class="cover-sub">The [ Campaign Name ] Chronicle</p>
        <p class="cover-hint">Click to open</p>
      </div>
    </div>

  </div>
</div>

<script>
  // ---- Replace this with your actual Foundry VTT server URL ----
  const FOUNDRY_URL = "https://your-foundry-server.example.com";

  const book = document.getElementById('book');
  const cover = document.getElementById('cover');
  const pageRight = document.getElementById('pageRight');
  const tabs = document.querySelectorAll('.tab');
  const tocItems = document.querySelectorAll('.toc-list li');

  const chapters = {
    welcome: `
      <p class="chapter-label">Chapter I</p>
      <h2 class="chapter-title">Welcome, Traveler</h2>
      <p class="drop-cap">You hold in your hands the chronicle of an unfinished tale — one written a session at a time, by a small fellowship who gather to tell it. <span class="placeholder">[Replace this with a short blurb about your campaign's setting, tone, or premise.]</span></p>
      <p class="placeholder">[Optional: add a line about how often you meet, e.g. "We gather every other Thursday, 7pm CT."]</p>
    `,
    party: `
      <p class="chapter-label">Chapter II</p>
      <h2 class="chapter-title">The Party</h2>
      <table class="roster">
        <thead><tr><th>Character</th><th>Player</th><th>Class &amp; Level</th></tr></thead>
        <tbody>
          <tr><td class="placeholder">[Character Name]</td><td class="placeholder">[Player]</td><td class="placeholder">[Class, Lvl]</td></tr>
          <tr><td class="placeholder">[Character Name]</td><td class="placeholder">[Player]</td><td class="placeholder">[Class, Lvl]</td></tr>
          <tr><td class="placeholder">[Character Name]</td><td class="placeholder">[Player]</td><td class="placeholder">[Class, Lvl]</td></tr>
        </tbody>
      </table>
    `,
    session: `
      <p class="chapter-label">Chapter III</p>
      <h2 class="chapter-title">Tonight's Session</h2>
      <div class="session-card">
        <p class="meta">Next Session</p>
        <p class="placeholder">[Date, time, and any prep notes go here.]</p>
      </div>
      <div class="session-card">
        <p class="meta">Last Time, On Our Story</p>
        <p class="placeholder">[A short recap of the previous session for anyone who missed it.]</p>
      </div>
    `,
    rules: `
      <p class="chapter-label">Chapter IV</p>
      <h2 class="chapter-title">House Rules</h2>
      <ul class="rules-list">
        <li class="placeholder">[House rule one — e.g. critical hit variant.]</li>
        <li class="placeholder">[House rule two — e.g. resting rules.]</li>
        <li class="placeholder">[House rule three — e.g. multiclassing policy.]</li>
      </ul>
      <a class="conduct-link" href="conduct.html">Read the full Code of Conduct →</a>
    `,
    realm: `
      <div class="realm-wrap">
        <p class="chapter-label">Chapter V</p>
        <h2 class="chapter-title">Enter the Realm</h2>
        <button class="seal" id="sealBtn" aria-label="Enter Foundry VTT">
          <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 6 L34 26 L54 30 L34 34 L30 54 L26 34 L6 30 L26 26 Z" fill="#ecd8a4"/>
          </svg>
        </button>
        <p class="realm-label">Break the Seal to Begin</p>
      </div>
    `
  };

  function setActive(name){
    tabs.forEach(t => t.classList.toggle('active', t.dataset.chapter === name));
  }

  function showChapter(name){
    pageRight.style.opacity = 0;
    pageRight.style.transform = 'translateY(6px)';
    setTimeout(() => {
      pageRight.innerHTML = chapters[name] || chapters.welcome;
      pageRight.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      pageRight.style.opacity = 1;
      pageRight.style.transform = 'translateY(0)';
      setActive(name);
      if(name === 'realm'){
        document.getElementById('sealBtn').addEventListener('click', breakSeal);
      }
    }, 180);
  }

  function breakSeal(){
    const seal = document.getElementById('sealBtn');
    seal.classList.add('cracking');
    setTimeout(() => { window.location.href = FOUNDRY_URL; }, 550);
  }

  tabs.forEach(t => t.addEventListener('click', () => showChapter(t.dataset.chapter)));
  tocItems.forEach(li => li.addEventListener('click', () => showChapter(li.dataset.chapter)));

  cover.addEventListener('click', () => {
    book.classList.add('open');
  });

  showChapter('welcome');

  // ambient dust motes
  const motesEl = document.getElementById('motes');
  for(let i = 0; i < 18; i++){
    const m = document.createElement('div');
    m.className = 'mote';
    m.style.left = Math.random() * 100 + 'vw';
    m.style.bottom = '-10px';
    m.style.animationDelay = (Math.random() * 14) + 's';
    m.style.animationDuration = (10 + Math.random() * 8) + 's';
    motesEl.appendChild(m);
  }
</script>

</body>
</html>
